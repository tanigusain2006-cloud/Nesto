<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NESTO Adaptive Learning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      box-sizing: border-box;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
    }
    
    .emoji-button {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .emoji-button:hover {
      transform: scale(1.1);
    }
    
    .emoji-button:active {
      transform: scale(0.95);
    }
    
    .pulse-animation {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    .celebration {
      animation: celebrate 0.6s ease-out;
    }
    
    @keyframes celebrate {
      0% { transform: scale(1); }
      50% { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1); }
    }

    .inline-confirmation {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full"></div>
  <script>
    // Configuration
    const config = {
      app_title: "NESTO",
      welcome_message: "Let's learn together!",
      parent_dashboard_title: "Parent Insights",
      background_color: "#FFF5E6",
      surface_color: "#FFFFFF",
      text_color: "#2C3E50",
      primary_action_color: "#FF6B6B",
      secondary_action_color: "#4ECDC4",
      font_family: "Comic Sans MS",
      font_size: 18
    };

    // LocalStorage Manager
    class StorageManager {
      constructor() {
        this.storageKey = 'nesto_session_data';
      }

      saveInteraction(interaction) {
        const data = this.getAllInteractions();
        data.push(interaction);
        localStorage.setItem(this.storageKey, JSON.stringify(data));
      }

      getAllInteractions() {
        const data = localStorage.getItem(this.storageKey);
        return data ? JSON.parse(data) : [];
      }

      clearAll() {
        localStorage.removeItem(this.storageKey);
      }
    }

    // Adaptive Learning Engine
    class AdaptiveLearningEngine {
      constructor() {
        this.storage = new StorageManager();
        this.sessionData = this.storage.getAllInteractions();
        this.learningProfile = {
          preferredMode: 'mixed',
          engagementLevel: 'medium',
          visualScore: 0,
          audioScore: 0,
          mixedScore: 0
        };
        this.recalculateProfile();
      }

      recalculateProfile() {
        // Recalculate scores from stored data
        this.learningProfile = {
          preferredMode: 'mixed',
          engagementLevel: 'medium',
          visualScore: 0,
          audioScore: 0,
          mixedScore: 0
        };

        this.sessionData.forEach(data => {
          if (data.mode === 'visual') {
            this.learningProfile.visualScore += data.correct ? 2 : -1;
          } else if (data.mode === 'audio') {
            this.learningProfile.audioScore += data.correct ? 2 : -1;
          } else if (data.mode === 'mixed') {
            this.learningProfile.mixedScore += data.correct ? 2 : -1;
          }
        });

        // Determine preferred mode
        const scores = {
          visual: this.learningProfile.visualScore,
          audio: this.learningProfile.audioScore,
          mixed: this.learningProfile.mixedScore
        };
        
        this.learningProfile.preferredMode = Object.keys(scores).reduce((a, b) => 
          scores[a] > scores[b] ? a : b
        );

        // Calculate engagement level
        if (this.sessionData.length >= 5) {
          const recent = this.sessionData.slice(-5);
          const avgResponseTime = recent.reduce((sum, d) => sum + d.responseTime, 0) / recent.length;
          const recentAccuracy = recent.filter(d => d.correct).length / recent.length;
          
          if (avgResponseTime < 3000 && recentAccuracy > 0.7) {
            this.learningProfile.engagementLevel = 'high';
          } else if (avgResponseTime > 8000 || recentAccuracy < 0.3) {
            this.learningProfile.engagementLevel = 'low';
          } else {
            this.learningProfile.engagementLevel = 'medium';
          }
        }
      }

      recordInteraction(data) {
        const interaction = {
          ...data,
          timestamp: Date.now()
        };
        
        this.sessionData.push(interaction);
        this.storage.saveInteraction(interaction);
        this.updateLearningProfile(data);
      }

      updateLearningProfile(data) {
        // Track success by mode
        if (data.mode === 'visual') {
          this.learningProfile.visualScore += data.correct ? 2 : -1;
        } else if (data.mode === 'audio') {
          this.learningProfile.audioScore += data.correct ? 2 : -1;
        } else if (data.mode === 'mixed') {
          this.learningProfile.mixedScore += data.correct ? 2 : -1;
        }

        // Determine preferred mode
        const scores = {
          visual: this.learningProfile.visualScore,
          audio: this.learningProfile.audioScore,
          mixed: this.learningProfile.mixedScore
        };
        
        this.learningProfile.preferredMode = Object.keys(scores).reduce((a, b) => 
          scores[a] > scores[b] ? a : b
        );

        // Calculate engagement level
        const avgResponseTime = this.sessionData.slice(-5).reduce((sum, d) => sum + d.responseTime, 0) / Math.min(5, this.sessionData.length);
        const recentAccuracy = this.sessionData.slice(-5).filter(d => d.correct).length / Math.min(5, this.sessionData.length);
        
        if (avgResponseTime < 3000 && recentAccuracy > 0.7) {
          this.learningProfile.engagementLevel = 'high';
        } else if (avgResponseTime > 8000 || recentAccuracy < 0.3) {
          this.learningProfile.engagementLevel = 'low';
        } else {
          this.learningProfile.engagementLevel = 'medium';
        }
      }

      getAdaptiveDifficulty() {
        const engagement = this.learningProfile.engagementLevel;
        if (engagement === 'low') return 2;
        if (engagement === 'high') return 4;
        return 3;
      }

      generateExplanation(language = 'parent') {
        const recent = this.sessionData.slice(-5);
        if (recent.length === 0) {
          return language === 'parent' 
            ? 'Not enough activity data yet to make recommendations'
            : 'Insufficient interaction data for pattern analysis';
        }

        const mode = this.learningProfile.preferredMode;
        const visualActivities = this.sessionData.filter(d => d.mode === 'visual');
        const audioActivities = this.sessionData.filter(d => d.mode === 'audio');
        const mixedActivities = this.sessionData.filter(d => d.mode === 'mixed');

        const visualAvgTime = visualActivities.length > 0 
          ? visualActivities.reduce((sum, d) => sum + d.responseTime, 0) / visualActivities.length 
          : Infinity;
        const visualAccuracy = visualActivities.length > 0 
          ? visualActivities.filter(d => d.correct).length / visualActivities.length 
          : 0;
        const audioAccuracy = audioActivities.length > 0 
          ? audioActivities.filter(d => d.correct).length / audioActivities.length 
          : 0;
        const mixedAccuracy = mixedActivities.length > 0 
          ? mixedActivities.filter(d => d.correct).length / mixedActivities.length 
          : 0;

        if (language === 'parent') {
          if (mode === 'visual') {
            return `Visual activities were completed ${visualAvgTime < 4000 ? 'quickly' : 'thoughtfully'} with ${(visualAccuracy * 100).toFixed(0)}% accuracy. Your child responds well to seeing pictures and colors.`;
          } else if (mode === 'audio') {
            return `Audio-based activities show ${(audioAccuracy * 100).toFixed(0)}% success rate. Your child learns effectively through listening and sounds.`;
          } else {
            return `Mixed activities (combining pictures and interactions) work best, with ${(mixedAccuracy * 100).toFixed(0)}% accuracy. Your child benefits from variety.`;
          }
        } else {
          if (mode === 'visual') {
            return `Learner demonstrates ${visualAccuracy > 0.7 ? 'strong' : 'developing'} visual processing with mean response time of ${(visualAvgTime / 1000).toFixed(1)}s. Visual-spatial learning pathway is optimal.`;
          } else if (mode === 'audio') {
            return `Auditory processing shows ${(audioAccuracy * 100).toFixed(0)}% accuracy rate. Learner benefits from verbal-auditory instruction modality.`;
          } else {
            return `Multi-modal instruction yields ${(mixedAccuracy * 100).toFixed(0)}% success rate. Learner demonstrates adaptive engagement across modalities.`;
          }
        }
      }

      getAdaptiveRecommendation() {
        const profile = this.learningProfile;
        
        if (profile.engagementLevel === 'low') {
          return {
            mode: 'mixed',
            suggestion: 'Try shorter, more interactive activities with sounds and animations',
            reason: 'Child may need more stimulation'
          };
        }
        
        if (profile.engagementLevel === 'high') {
          return {
            mode: profile.preferredMode,
            suggestion: `Continue with ${profile.preferredMode} activities - they're working great!`,
            reason: 'Child is engaged and learning well'
          };
        }

        return {
          mode: profile.preferredMode,
          suggestion: `Focus on ${profile.preferredMode} learning with gentle encouragement`,
          reason: 'Building confidence and consistency'
        };
      }

      getParentInsights(language = 'parent') {
        const totalActivities = this.sessionData.length;
        const correctAnswers = this.sessionData.filter(d => d.correct).length;
        const accuracy = totalActivities > 0 ? (correctAnswers / totalActivities * 100).toFixed(0) : 0;
        
        return {
          preferredMode: this.learningProfile.preferredMode,
          engagementLevel: this.learningProfile.engagementLevel,
          totalActivities,
          accuracy,
          recommendation: this.getAdaptiveRecommendation(),
          explanation: this.generateExplanation(language),
          recentActivities: this.sessionData.slice(-5).reverse(),
          currentDifficulty: this.getAdaptiveDifficulty()
        };
      }

      reset() {
        this.storage.clearAll();
        this.sessionData = [];
        this.learningProfile = {
          preferredMode: 'mixed',
          engagementLevel: 'medium',
          visualScore: 0,
          audioScore: 0,
          mixedScore: 0
        };
      }
    }

    // Initialize adaptive engine
    const adaptiveEngine = new AdaptiveLearningEngine();

    // Emotion matching activities
    const emotions = [
      { emoji: '😊', name: 'Happy', color: '#FFD93D' },
      { emoji: '😢', name: 'Sad', color: '#6C9BCF' },
      { emoji: '😠', name: 'Angry', color: '#FF6B6B' },
      { emoji: '😴', name: 'Sleepy', color: '#B5A8D6' }
    ];

    // App State
    let currentView = 'child';
    let currentActivity = null;
    let activityStartTime = 0;
    let attempts = 0;
    let showCelebration = false;
    let feedbackMessage = '';
    let insightLanguage = 'parent';
    let showResetConfirmation = false;

    function startActivity(mode = 'visual') {
      const difficulty = adaptiveEngine.getAdaptiveDifficulty();
      const targetEmotion = emotions[Math.floor(Math.random() * emotions.length)];
      const shuffled = [...emotions].sort(() => Math.random() - 0.5);
      const options = shuffled.slice(0, difficulty);
      
      // Ensure target is in options
      if (!options.find(e => e.name === targetEmotion.name)) {
        options[0] = targetEmotion;
      }
      options.sort(() => Math.random() - 0.5);
      
      currentActivity = {
        mode,
        target: targetEmotion,
        options,
        difficulty
      };
      
      activityStartTime = Date.now();
      attempts = 0;
      showCelebration = false;
      feedbackMessage = '';
      
      render();
    }

    function handleAnswer(selectedEmotion) {
      attempts++;
      let responseTime = Date.now() - activityStartTime;
      
      // Add realistic variance: ±500ms
      responseTime += (Math.random() * 1000) - 500;
      responseTime = Math.max(1000, responseTime);
      
      let correct = selectedEmotion.name === currentActivity.target.name;
      
      // Simulate occasional errors even on quick correct responses (10% chance)
      if (correct && responseTime < 2500 && Math.random() < 0.1) {
        correct = false;
      }
      
      if (correct) {
        showCelebration = true;
        feedbackMessage = '🎉 Great job!';
        
        adaptiveEngine.recordInteraction({
          activityType: 'emotion_matching',
          mode: currentActivity.mode,
          correct: true,
          attempts,
          responseTime,
          engagementIndicators: attempts === 1 ? 'confident' : 'learning'
        });
        
        setTimeout(() => {
          const recommendation = adaptiveEngine.getAdaptiveRecommendation();
          startActivity(recommendation.mode);
        }, 2000);
      } else {
        feedbackMessage = '💪 Try again!';
        
        adaptiveEngine.recordInteraction({
          activityType: 'emotion_matching',
          mode: currentActivity.mode,
          correct: false,
          attempts,
          responseTime,
          engagementIndicators: 'needs_support'
        });
        
        setTimeout(() => {
          feedbackMessage = '';
          render();
        }, 1500);
      }
      
      render();
    }

    function switchView(view) {
      currentView = view;
      showResetConfirmation = false;
      render();
    }

    function toggleInsightLanguage() {
      insightLanguage = insightLanguage === 'parent' ? 'educator' : 'parent';
      render();
    }

    function showResetDialog() {
      showResetConfirmation = true;
      render();
    }

    function cancelReset() {
      showResetConfirmation = false;
      render();
    }

    function confirmReset() {
      adaptiveEngine.reset();
      showResetConfirmation = false;
      render();
    }

    function renderChildInterface() {
      const customFont = config.font_family;
      const baseFontStack = 'Arial Rounded MT Bold, sans-serif';
      const baseSize = config.font_size;
      const backgroundColor = config.background_color;
      const surfaceColor = config.surface_color;
      const textColor = config.text_color;
      const primaryColor = config.primary_action_color;
      const secondaryColor = config.secondary_action_color;
      const appTitle = config.app_title;
      const welcomeMessage = config.welcome_message;

      if (!currentActivity) {
        return `
          <div class="h-full w-full flex flex-col items-center justify-center" style="background: ${backgroundColor};">
            <div class="text-center">
              <h1 class="mb-8" style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 3}px; color: ${textColor}; font-weight: bold;">
                ${appTitle}
              </h1>
              <p class="mb-12" style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.5}px; color: ${textColor};">
                ${welcomeMessage}
              </p>
              <button id="startBtn" class="emoji-button px-12 py-8 rounded-full shadow-lg" style="background: ${primaryColor}; color: white; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.2}px; border: none; cursor: pointer; font-weight: bold;">
                🚀 Start Learning!
              </button>
            </div>
            <button id="parentViewBtn1" class="absolute bottom-8 right-8 px-6 py-3 rounded-lg shadow" style="background: ${secondaryColor}; color: white; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.8}px; border: none; cursor: pointer;">
              👨‍👩‍👧 Parent View
            </button>
          </div>
        `;
      }

      const gridCols = currentActivity.options.length === 2 ? 'grid-cols-2' : currentActivity.options.length === 3 ? 'grid-cols-3' : 'grid-cols-2';

      return `
        <div class="h-full w-full flex flex-col" style="background: ${backgroundColor};">
          <div class="absolute top-6 right-6 z-10">
            <button id="parentViewBtn2" class="px-5 py-2 rounded-lg shadow" style="background: ${secondaryColor}; color: white; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.85}px; border: none; cursor: pointer; font-weight: bold;">
              👨‍👩‍👧 Parent View
            </button>
          </div>
          <div class="flex-1 flex flex-col items-center justify-center p-8">
            <div class="text-center mb-12">
              <p class="mb-8" style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.5}px; color: ${textColor}; font-weight: bold;">
                Find the ${currentActivity.target.name} face!
              </p>
              <div class="text-9xl mb-8 ${showCelebration ? 'celebration' : 'pulse-animation'}">
                ${currentActivity.target.emoji}
              </div>
            </div>

            ${feedbackMessage ? `
              <div class="mb-8 px-8 py-4 rounded-full shadow-lg" style="background: ${surfaceColor}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.3}px; color: ${textColor}; font-weight: bold;">
                ${feedbackMessage}
              </div>
            ` : ''}

            <div class="grid ${gridCols} gap-8 max-w-3xl" id="emotionButtons">
              ${currentActivity.options.map((emotion, idx) => `
                <button data-emotion='${JSON.stringify(emotion)}' data-idx="${idx}" class="emotion-btn emoji-button p-8 rounded-3xl shadow-xl transition-all" style="background: ${surfaceColor}; border: 4px solid ${emotion.color}; cursor: pointer;">
                  <div class="text-8xl mb-4">${emotion.emoji}</div>
                  <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.2}px; color: ${textColor}; font-weight: bold;">
                    ${emotion.name}
                  </div>
                </button>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderParentDashboard() {
      const customFont = config.font_family;
      const baseFontStack = 'Arial, sans-serif';
      const baseSize = config.font_size;
      const backgroundColor = config.background_color;
      const surfaceColor = config.surface_color;
      const textColor = config.text_color;
      const primaryColor = config.primary_action_color;
      const secondaryColor = config.secondary_action_color;
      const dashboardTitle = config.parent_dashboard_title;

      const insights = adaptiveEngine.getParentInsights(insightLanguage);

      const modeEmojis = {
        visual: '👁️',
        audio: '🔊',
        mixed: '🎨'
      };

      const engagementEmojis = {
        low: '😴',
        medium: '🙂',
        high: '🌟'
      };

      const engagementColors = {
        low: '#FFB6C1',
        medium: '#FFD700',
        high: '#90EE90'
      };

      const difficultyLabels = {
        2: 'Easy (2 choices)',
        3: 'Medium (3 choices)',
        4: 'Hard (4 choices)'
      };

      const getResponseSpeed = (time) => {
        if (time < 3000) return { label: 'Fast', color: '#90EE90' };
        if (time < 6000) return { label: 'Medium', color: '#FFD700' };
        return { label: 'Slow', color: '#FFB6C1' };
      };

      return `
        <div class="h-full w-full overflow-auto" style="background: ${backgroundColor};">
          <div class="max-w-5xl mx-auto p-8">
            <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
              <h1 style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 2}px; color: ${textColor}; font-weight: bold;">
                ${dashboardTitle}
              </h1>
              <div class="flex gap-3">
                <button id="toggleLanguageBtn" class="px-4 py-2 rounded-lg shadow" style="background: ${surfaceColor}; color: ${textColor}; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.85}px; border: 2px solid ${secondaryColor}; cursor: pointer;">
                  ${insightLanguage === 'parent' ? '👨‍👩‍👧 Parent' : '👩‍🏫 Educator'} View
                </button>
                <button id="backBtn" class="px-6 py-2 rounded-lg shadow" style="background: ${primaryColor}; color: white; font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize}px; border: none; cursor: pointer; font-weight: bold;">
                  ← Back
                </button>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
              <div class="p-6 rounded-xl shadow-lg" style="background: ${surfaceColor};">
                <div class="text-4xl mb-3">${modeEmojis[insights.preferredMode]}</div>
                <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.75}px; color: #666; margin-bottom: 8px;">
                  ${insightLanguage === 'parent' ? 'Preferred Learning' : 'Optimal Modality'}
                </div>
                <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.2}px; color: ${textColor}; font-weight: bold; text-transform: capitalize;">
                  ${insights.preferredMode}
                </div>
              </div>

              <div class="p-6 rounded-xl shadow-lg" style="background: ${surfaceColor};">
                <div class="text-4xl mb-3">${engagementEmojis[insights.engagementLevel]}</div>
                <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.75}px; color: #666; margin-bottom: 8px;">
                  ${insightLanguage === 'parent' ? 'Engagement Level' : 'Attention Capacity'}
                </div>
                <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.2}px; color: ${engagementColors[insights.engagementLevel]}; font-weight: bold; text-transform: capitalize;">
                  ${insights.engagementLevel}
                </div>
              </div>

              <div class="p-6 rounded-xl shadow-lg" style="background: ${surfaceColor};">
                <div class="text-4xl mb-3">✅</div>
                <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.75}px; color: #666; margin-bottom: 8px;">
                  ${insightLanguage === 'parent' ? 'Success Rate' : 'Accuracy Rate'}
                </div>
                <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.2}px; color: ${textColor}; font-weight: bold;">
                  ${insights.accuracy}%
                </div>
                <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.7}px; color: #999;">
                  ${insights.totalActivities} ${insightLanguage === 'parent' ? 'activities' : 'trials'}
                </div>
              </div>

              <div class="p-6 rounded-xl shadow-lg" style="background: ${surfaceColor};">
                <div class="text-4xl mb-3">🎯</div>
                <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.75}px; color: #666; margin-bottom: 8px;">
                  ${insightLanguage === 'parent' ? 'Current Difficulty' : 'Adaptive Level'}
                </div>
                <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.2}px; color: ${textColor}; font-weight: bold;">
                  ${difficultyLabels[insights.currentDifficulty]}
                </div>
              </div>
            </div>

            <div class="p-6 rounded-xl shadow-lg mb-6" style="background: ${surfaceColor};">
              <div class="flex items-start mb-4">
                <div class="text-3xl mr-4">🧠</div>
                <div class="flex-1">
                  <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.1}px; color: ${textColor}; font-weight: bold; margin-bottom: 8px;">
                    ${insightLanguage === 'parent' ? 'Why This Matters' : 'Learning Analysis'}
                  </div>
                  <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize}px; color: ${textColor}; line-height: 1.6;">
                    ${insights.explanation}
                  </div>
                </div>
              </div>
            </div>

            ${insights.recentActivities.length > 0 ? `
              <div class="p-6 rounded-xl shadow-lg mb-6" style="background: ${surfaceColor};">
                <div class="mb-4" style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 1.1}px; color: ${textColor}; font-weight: bold;">
                  📊 ${insightLanguage === 'parent' ? 'Recent Activity Timeline' : 'Session Performance Log'}
                </div>
                <div class="space-y-3">
                  ${insights.recentActivities.map((activity, index) => {
                    const speed = getResponseSpeed(activity.responseTime);
                    const timeAgo = index === 0 ? 'Just now' : `${index} ${insightLanguage === 'parent' ? 'activities ago' : 'trials ago'}`;
                    return `
                      <div class="flex items-center justify-between p-4 rounded-lg" style="background: ${backgroundColor};">
                        <div class="flex items-center gap-4">
                          <div class="text-2xl">${activity.correct ? '✅' : '❌'}</div>
                          <div>
                            <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.9}px; color: ${textColor}; font-weight: 600;">
                              ${activity.activityType.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase())}
                            </div>
                            <div style="font-family: ${customFont}, ${baseFontStack}; font-size: ${baseSize * 0.75}px; color: #666;">
                              ${timeAgo} • ${activity.attempts} ${insightLanguage === 'parent' ? 'tries' : 'attempts'}
                            </div>
                          </div>
                        </div>
